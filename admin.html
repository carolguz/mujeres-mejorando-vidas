<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Mejorando Vidas ONG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --rojo: #c0392b;
      --naranja: #e67e22;
      --amarillo: #f1c40f;
      --negro: #1a1a1a;
      --blanco: #ffffff;
      --gris: #f7f4f0;
      --gris-texto: #555;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: var(--gris); color: var(--negro); }

    /* ─── LOGIN ─── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #b94a00 0%, #e67e22 100%);
    }

    .login-box {
      background: var(--blanco);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      text-align: center;
    }

    .login-box img { width: 80px; margin-bottom: 1rem; }

    .login-box h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--naranja);
      margin-bottom: 0.3rem;
    }

    .login-box p { color: #aaa; font-size: 0.85rem; margin-bottom: 2rem; }

    .input-group { margin-bottom: 1rem; text-align: left; }
    .input-group label { font-size: 0.82rem; font-weight: 700; color: var(--gris-texto); display: block; margin-bottom: 0.3rem; }
    .input-group input {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 2px solid #eee;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: 'Nunito', sans-serif;
      transition: border 0.2s;
    }
    .input-group input:focus { outline: none; border-color: var(--naranja); }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, var(--rojo), var(--naranja));
      color: var(--blanco);
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }

    .btn-login:hover { opacity: 0.85; }
    .error-msg { color: var(--rojo); font-size: 0.82rem; margin-top: 0.8rem; }

    /* ─── PANEL ADMIN ─── */
    #admin-panel { display: none; }

    header {
      background: var(--negro);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      color: var(--amarillo);
      font-size: 1.2rem;
    }

    .btn-salir {
      background: rgba(255,255,255,0.1);
      color: var(--blanco);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 0.4rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .tabs {
      display: flex;
      gap: 0;
      background: var(--blanco);
      border-bottom: 2px solid #eee;
      padding: 0 2rem;
    }

    .tab {
      padding: 1rem 1.5rem;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.9rem;
      color: #aaa;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }

    .tab.activo { color: var(--naranja); border-bottom-color: var(--naranja); }

    .tab-content { display: none; padding: 2rem; max-width: 900px; margin: 0 auto; }
    .tab-content.activo { display: block; }

    .card {
      background: var(--blanco);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 3px 16px rgba(0,0,0,0.07);
      margin-bottom: 2rem;
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      color: var(--naranja);
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      padding-bottom: 0.8rem;
      border-bottom: 2px solid #f0f0f0;
    }

    .form-group { margin-bottom: 1rem; }
    .form-group label { font-size: 0.82rem; font-weight: 700; color: var(--gris-texto); display: block; margin-bottom: 0.4rem; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 2px solid #eee;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: 'Nunito', sans-serif;
      transition: border 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--naranja); }
    .form-group textarea { min-height: 120px; resize: vertical; }

    .btn-publicar {
      background: linear-gradient(135deg, var(--rojo), var(--naranja));
      color: var(--blanco);
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-publicar:hover { opacity: 0.85; }
    .btn-publicar:disabled { opacity: 0.5; cursor: not-allowed; }

    .success-msg { color: green; font-size: 0.85rem; margin-top: 0.8rem; }
    .error-msg2 { color: var(--rojo); font-size: 0.85rem; margin-top: 0.8rem; }

    /* Lista de publicaciones */
    .item-lista {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      border: 1px solid #eee;
      border-radius: 10px;
      margin-bottom: 0.8rem;
      gap: 1rem;
    }

    .item-lista-info { flex: 1; }
    .item-lista-info strong { display: block; font-size: 0.9rem; }
    .item-lista-info span { font-size: 0.78rem; color: #aaa; }

    .btn-borrar {
      background: #fee;
      color: var(--rojo);
      border: 1px solid #fcc;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .btn-borrar:hover { background: var(--rojo); color: var(--blanco); }

    .preview-img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .loading { color: #aaa; font-size: 0.85rem; padding: 1rem 0; }
  </style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-box">
    <img src="logo.webp" alt="Logo" loading="lazy" onerror="this.src='logo.png'"/>
    <h1>Panel Administrativo</h1>
    <p>Mejorando Vidas ONG — Acceso restringido</p>

    <div class="input-group">
      <label>Correo electrónico</label>
      <input type="email" id="login-email" placeholder="correo@gmail.com"/>
    </div>
    <div class="input-group">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') iniciarSesion()"/>
    </div>
    <button class="btn-login" onclick="iniciarSesion()">Entrar al panel</button>
    <p class="error-msg" id="login-error"></p>
  </div>
</div>

<!-- ═══ PANEL ADMIN ═══ -->
<div id="admin-panel">
  <header>
    <h1>🌻 Panel Admin — Mejorando Vidas ONG</h1>
    <button class="btn-salir" onclick="cerrarSesion()">Cerrar sesión</button>
  </header>

  <div class="tabs">
    <div class="tab activo" onclick="cambiarTab('noticias')"> Noticias</div>
    <div class="tab" onclick="cambiarTab('transparencia')"> Transparencia</div>
  </div>

  <!-- TAB NOTICIAS -->
  <div class="tab-content activo" id="tab-noticias">

    <div class="card">
      <h2>➕ Nueva Noticia</h2>
      <div class="form-group">
        <label>Título de la noticia</label>
        <input type="text" id="noticia-titulo" placeholder="Escribe el título..."/>
      </div>
      <div class="form-group">
        <label>Contenido / Descripción</label>
        <textarea id="noticia-contenido" placeholder="Escribe el contenido de la noticia..."></textarea>
      </div>
      <div class="form-group">
        <label>Foto (JPG, PNG)</label>
        <input type="file" id="noticia-foto" accept="image/*"/>
      </div>
      <button class="btn-publicar" onclick="publicarNoticia()" id="btn-publicar-noticia">Publicar noticia</button>
      <p class="success-msg" id="noticia-ok"></p>
      <p class="error-msg2" id="noticia-error"></p>
    </div>

    <div class="card">
      <h2>📋 Noticias publicadas</h2>
      <div id="lista-noticias"><p class="loading">Cargando noticias...</p></div>
    </div>

  </div>

  <!-- TAB TRANSPARENCIA -->
  <div class="tab-content" id="tab-transparencia">

    <div class="card">
      <h2>➕ Subir Documento</h2>
      <div class="form-group">
        <label>Sección del Artículo 10</label>
        <select id="doc-seccion">
          <option value="art10_1">Art. 10 No. 1 — Estructura Orgánica y Funciones</option>
          <option value="art10_2">Art. 10 No. 2 — Dirección y Teléfonos</option>
          <option value="art10_3">Art. 10 No. 3 — Directorio de Empleados</option>
          <option value="art10_4">Art. 10 No. 4 — Misión y Plan Operativo</option>
          <option value="art10_5">Art. 10 No. 5 — Manuales de Procedimientos</option>
          <option value="art10_6">Art. 10 No. 6 — Presupuesto de Ingresos y Egresos</option>
          <option value="art10_7">Art. 10 No. 7 — Informes Mensuales</option>
          <option value="art10_8">Art. 10 No. 8 — Depósitos con Fondos Públicos</option>
          <option value="art10_9">Art. 10 No. 9 — Informes de Auditorías</option>
          <option value="art10_10">Art. 10 No. 10 — Datos Sociolingüísticos</option>
        </select>
      </div>
      <div class="form-group">
        <label>Título del documento</label>
        <input type="text" id="doc-titulo" placeholder="Ej: Presupuesto 2025"/>
      </div>
      <div class="form-group">
        <label>Archivo PDF</label>
        <input type="file" id="doc-archivo" accept=".pdf"/>
      </div>
      <button class="btn-publicar" onclick="subirDocumento()" id="btn-subir-doc">Subir documento</button>
      <p class="success-msg" id="doc-ok"></p>
      <p class="error-msg2" id="doc-error"></p>
    </div>

    <div class="card">
      <h2>📋 Documentos subidos</h2>
      <div id="lista-documentos"><p class="loading">Cargando documentos...</p></div>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL = 'https://tqoeceghkrtkhoaxigtz.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_XV2lTFtYCHkO1174Z4yG3g_AZnOptYK';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ─── LOGIN ───
  const CORREOS_AUTORIZADOS = [
    'asocmejorandovidas@gmail.com',
    'recursoshumanosmejorandovidas@gmail.com'
  ];

  async function iniciarSesion() {
    const email = document.getElementById('login-email').value.trim().toLowerCase();
    const pass = document.getElementById('login-pass').value;
    document.getElementById('login-error').textContent = '';

    if (!CORREOS_AUTORIZADOS.includes(email)) {
      document.getElementById('login-error').textContent = 'No tienes permisos para acceder a este panel.';
      return;
    }

    const { error } = await sb.auth.signInWithPassword({ email, password: pass });

    if (error) {
      document.getElementById('login-error').textContent = 'Correo o contraseña incorrectos.';
    } else {
      mostrarPanel();
    }
  }

  async function cerrarSesion() {
    await sb.auth.signOut();
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  function mostrarPanel() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    cargarNoticias();
    cargarDocumentos();
  }

  window.addEventListener('load', async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) mostrarPanel();
  });

  function cambiarTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('activo'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('activo'));
    document.getElementById('tab-' + tab).classList.add('activo');
    event.target.classList.add('activo');
  }

  // ─── NOTICIAS ───
    // Función para comprimir imagen
  async function comprimirImagen(file) {
    return new Promise((resolve) => {
      const img = new Image();
      const reader = new FileReader();

      reader.onload = (e) => img.src = e.target.result;

      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxWidth = 800;

        let width = img.width;
        let height = img.height;

        if (width > maxWidth) {
          height *= maxWidth / width;
          width = maxWidth;
        }

        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        canvas.toBlob((blob) => {
          resolve(blob);
        }, 'image/webp', 0.7);
      };

      reader.readAsDataURL(file);
    });
  }

  async function publicarNoticia() {
    const titulo = document.getElementById('noticia-titulo').value.trim();
    const contenido = document.getElementById('noticia-contenido').value.trim();
    let foto = document.getElementById('noticia-foto').files[0];
    let nombreOriginal = foto ? foto.name : 'imagen';

    if (foto) {
      foto = await comprimirImagen(foto);
    }
    const btn = document.getElementById('btn-publicar-noticia');

    document.getElementById('noticia-ok').textContent = '';
    document.getElementById('noticia-error').textContent = '';

    if (!titulo || !contenido) {
      document.getElementById('noticia-error').textContent = 'El título y contenido son obligatorios.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Publicando...';

    let imagen_url = null;

    if (foto) {
      const nombre = `${Date.now()}_${nombreOriginal.split('.')[0]}.webp`;
      const { error: uploadError } = await sb.storage.from('Noticias').upload(nombre, foto);
      if (!uploadError) {
        const { data } = sb.storage.from('Noticias').getPublicUrl(nombre);
        imagen_url = data.publicUrl;
      }
    }

    const { error } = await sb.from('Noticias').insert([{
      titulo,
      contenido,
      imagen_url,
      autor: 'Mejorando Vidas ONG'
    }]);

    btn.disabled = false;
    btn.textContent = 'Publicar noticia';

    if (error) {
      document.getElementById('noticia-error').textContent = 'Error al publicar. Intenta de nuevo.';
    } else {
      document.getElementById('noticia-ok').textContent = ' Noticia publicada exitosamente.';
      document.getElementById('noticia-titulo').value = '';
      document.getElementById('noticia-contenido').value = '';
      document.getElementById('noticia-foto').value = '';
      cargarNoticias();
    }
  }

  async function cargarNoticias() {
    const { data, error } = await sb.from('Noticias').select('*').order('created_at', { ascending: false });
    const lista = document.getElementById('lista-noticias');

    if (error || !data || data.length === 0) {
      lista.innerHTML = '<p class="loading">No hay noticias publicadas aún.</p>';
      return;
    }

    lista.innerHTML = data.map(n => `
      <div class="item-lista">
        ${n.imagen_url ? `<img src="${n.imagen_url}" class="preview-img" alt="foto"/>` : ''}
        <div class="item-lista-info">
          <strong>${n.titulo}</strong>
          <span>${new Date(n.created_at).toLocaleDateString('es-GT')} · ${n.autor}</span>
        </div>
        <button class="btn-borrar" onclick="borrarNoticia(${n.id})"> Borrar</button>
      </div>
    `).join('');
  }

  async function borrarNoticia(id) {
    if (!confirm('¿Seguro que quieres borrar esta noticia?')) return;
    await sb.from('Noticias').delete().eq('id', id);
    cargarNoticias();
  }

  // ─── DOCUMENTOS ───
  async function subirDocumento() {
    const titulo = document.getElementById('doc-titulo').value.trim();
    const seccion = document.getElementById('doc-seccion').value;
    const archivo = document.getElementById('doc-archivo').files[0];
    const btn = document.getElementById('btn-subir-doc');

    document.getElementById('doc-ok').textContent = '';
    document.getElementById('doc-error').textContent = '';

    if (!titulo || !archivo) {
      document.getElementById('doc-error').textContent = 'El título y el archivo son obligatorios.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Subiendo...';

    const nombre = `${seccion}_${Date.now()}.pdf`;
    const { error: uploadError } = await sb.storage.from('Documentos').upload(nombre, archivo);

    if (uploadError) {
      document.getElementById('doc-error').textContent = 'Error al subir el archivo. Intenta de nuevo.';
      btn.disabled = false;
      btn.textContent = 'Subir documento';
      return;
    }

    const { data } = sb.storage.from('Documentos').getPublicUrl(nombre);
    const archivo_url = data.publicUrl;

    const { error } = await sb.from('Documentos').insert([{
      titulo,
      archivo_url,
      seccion,
      autor: 'Mejorando Vidas ONG'
    }]);

    btn.disabled = false;
    btn.textContent = 'Subir documento';

    if (error) {
      document.getElementById('doc-error').textContent = 'Error al guardar. Intenta de nuevo.';
    } else {
      document.getElementById('doc-ok').textContent = ' Documento subido exitosamente.';
      document.getElementById('doc-titulo').value = '';
      document.getElementById('doc-archivo').value = '';
      cargarDocumentos();
    }
  }

  async function cargarDocumentos() {
    const { data, error } = await sb.from('Documentos').select('*').order('created_at', { ascending: false });
    const lista = document.getElementById('lista-documentos');

    if (error || !data || data.length === 0) {
      lista.innerHTML = '<p class="loading">No hay documentos subidos aún.</p>';
      return;
    }

    lista.innerHTML = data.map(d => `
      <div class="item-lista">
        <div class="item-lista-info">
          <strong>${d.titulo}</strong>
          <span>${d.seccion.replace('art10_', 'Art. 10 No. ')} · ${new Date(d.created_at).toLocaleDateString('es-GT')}</span>
        </div>
        <a href="${d.archivo_url}" target="_blank" style="color:var(--naranja);font-size:0.8rem;font-weight:700;margin-right:0.5rem;">Ver PDF</a>
        <button class="btn-borrar" onclick="borrarDocumento(${d.id}, '${d.archivo_url}')"> Borrar</button>
      </div>
    `).join('');
  }

  async function borrarDocumento(id, url) {
    if (!confirm('¿Seguro que quieres borrar este documento?')) return;
    const nombre = url.split('/').pop();
    await sb.storage.from('Documentos').remove([nombre]);
    await sb.from('Documentos').delete().eq('id', id);
    cargarDocumentos();
  }
</script>

</body>
</html>
